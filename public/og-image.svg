<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7280;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Main content container -->
  <g transform="translate(80, 180)">
    <!-- Name -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">
      Zhu Jiaqi
    </text>
    
    <!-- Accent line -->
    <rect x="0" y="20" width="200" height="4" fill="url(#accent)" rx="2"/>
    
    <!-- Tagline -->
    <text x="0" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="400" fill="#a3a3a3">
      Full-Stack Developer
    </text>
    
    <text x="0" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="400" fill="#a3a3a3">
      Python &amp; Go Specialist
    </text>
    
    <text x="0" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="400" fill="#a3a3a3">
      AI Enthusiast
    </text>
    
    <!-- URL at bottom -->
    <text x="0" y="260" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="32" fill="#4a9eff">
      zjq.me
    </text>
  </g>
  
  <!-- Decorative code snippet (bottom right) -->
  <g transform="translate(720, 380)" opacity="0.3">
    <rect width="420" height="180" fill="#0a0a0a" rx="8"/>
    <text x="20" y="40" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#4a9eff">const</text>
    <text x="90" y="40" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#ffffff">developer</text>
    <text x="20" y="70" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#ffffff">=</text>
    <text x="50" y="70" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#4ec9b0">{"{"}</text>
    <text x="40" y="100" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#dcdcaa">name:</text>
    <text x="130" y="100" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#ce9178">'Zhu Jiaqi'</text>
    <text x="40" y="130" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#dcdcaa">skills:</text>
    <text x="210" y="130" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#ce9178">["Python", "Go", "AI"]</text>
    <text x="20" y="160" font-family="'SF Mono', Monaco, 'Courier New', monospace" font-size="18" fill="#4ec9b0">{"}"}</text>
  </g>
</svg>
